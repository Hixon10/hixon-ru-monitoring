name: hixon.ru Uptime Monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  uptime-check:
    runs-on: ubuntu-latest
    # Hard stop for the entire job after 3 minutes. 
    # Prevents stuck runners from wasting your free GitHub Action minutes.
    timeout-minutes: 3
    
    steps:
      - name: Check Website Response and Core Element
        run: |
          set -euo pipefail

          URL="https://hixon.ru/"
          EXPECTED_STRING='<h1 class="blog-title">Блог hixon'

          echo "Pinging $URL..."
          
          # --connect-timeout 5: Fails if it takes > 5s to establish the TCP connection
          # --max-time 15: Fails if the whole operation (transfer included) takes > 15s
          RESPONSE=$(curl -A "GitHubActions-MonitorBot" \
            --connect-timeout 5 \
            --max-time 15 \
            -s -L -o response.html -w "%{http_code}" "$URL")
          
          echo "HTTP Response Code: $RESPONSE"

          if [ "$RESPONSE" -ne 200 ]; then
            echo "::error::Site down! Expected HTTP 200, got $RESPONSE"
            exit 1
          fi

          # Safe evaluation with set -e
          grep -Fq "$EXPECTED_STRING" response.html && FOUND=0 || FOUND=$?

          if [ "$FOUND" -ne 0 ]; then
            echo "::error::Content mismatch! Could not find the expected blog title header."
            exit 1
          fi

          echo "Everything looks healthy!"
